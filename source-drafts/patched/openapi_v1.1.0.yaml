components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://auth.katopu.example.com/oauth2/token
          scopes:
            users.read: Read users
            users.write: Write users
            orders.read: Read orders
            orders.write: Write orders
            circuits.read: Read circuits
            circuits.write: Write circuits
            circuits.execute: Execute circuits
            quantum.read: Read quantum jobs
            quantum.execute: Execute quantum jobs
            guidance.read: Read guidance
            security.write: Encrypt/decrypt data
            monitoring.write: Run monitoring operations
            updates.read: Read system updates
            updates.write: Apply system updates
            training.read: Read training jobs
            training.write: Write training jobs
            notifications.write: Write notifications
            agi.write: Run AGI operations
  headers:
    XRequestId:
      description: Correlation ID for request tracing
      schema:
        type: string
        example: req_01HZZZXKZX7EP7DAX2GN9CT7R9
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        pattern: ^usr_[A-Za-z0-9]+$
      description: User identifier
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
        pattern: ^ord_[A-Za-z0-9]+$
      description: Order identifier
    CircuitId:
      name: circuitId
      in: path
      required: true
      schema:
        type: string
        pattern: ^cir_[A-Za-z0-9]+$
      description: Circuit identifier
    TrainingId:
      name: trainingId
      in: path
      required: true
      schema:
        type: string
        pattern: ^trn_[A-Za-z0-9]+$
      description: Training job identifier
    TrainingIdQuery:
      name: trainingId
      in: query
      required: true
      schema:
        type: string
        pattern: ^trn_[A-Za-z0-9]+$
      description: Training job identifier
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
        pattern: ^qjob_[A-Za-z0-9]+$
      description: Quantum job identifier
    FeedbackId:
      name: feedbackId
      in: path
      required: true
      schema:
        type: string
        pattern: ^fbk_[A-Za-z0-9]+$
      description: Feedback identifier
    ReleaseId:
      name: releaseId
      in: path
      required: true
      schema:
        type: string
        pattern: ^rel_[A-Za-z0-9]+$
      description: Release identifier
    VerificationId:
      name: verificationId
      in: path
      required: true
      schema:
        type: string
        pattern: ^ver_[A-Za-z0-9]+$
      description: Verification report identifier
    MonitorStream:
      name: stream
      in: query
      required: false
      schema:
        type: string
        enum:
        - performance
        - security
        - training
        default: performance
      description: Telemetry stream to subscribe to
  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            badRequest:
              value:
                requestId: req_01HZZZXKZX7EP7DAX2GN9CT7R9
                error:
                  code: bad_request
                  message: Request body failed validation.
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            notFound:
              value:
                requestId: req_01HZZZXKZX7EP7DAX2GN9CT7R9
                error:
                  code: not_found
                  message: Requested resource was not found.
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            conflict:
              value:
                requestId: req_01HZZZXKZX7EP7DAX2GN9CT7R9
                error:
                  code: conflict
                  message: Resource already exists.
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but not permitted
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Accepted:
      description: Request accepted for asynchronous processing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AcceptedResponse'
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
      - status
      - version
      - environment
      - timestamp
      properties:
        status:
          type: string
          enum:
          - ok
        version:
          type: string
        environment:
          type: string
          enum:
          - dev
          - staging
          - prod
        timestamp:
          type: string
          format: date-time
    ErrorDetail:
      type: object
      additionalProperties: false
      required:
      - code
      - message
      properties:
        code:
          type: string
          example: bad_request
        message:
          type: string
          example: Request body failed validation.
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
      - requestId
      - error
      properties:
        requestId:
          type: string
          example: req_01HZZZXKZX7EP7DAX2GN9CT7R9
        error:
          $ref: '#/components/schemas/ErrorDetail'
    SuccessMessage:
      type: object
      additionalProperties: false
      required:
      - message
      properties:
        message:
          type: string
          example: Operation completed successfully.
    UserCreateRequest:
      type: object
      additionalProperties: false
      required:
      - username
      - email
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
          pattern: ^[a-zA-Z0-9._-]+$
          example: skundem
        email:
          type: string
          format: email
          example: serkan@example.edu
    UserResponse:
      type: object
      additionalProperties: false
      required:
      - userId
      - username
      - email
      - createdAt
      properties:
        userId:
          type: string
          example: usr_01HZZY9V74N7R0H0V7S0A0B123
        username:
          type: string
          example: skundem
        email:
          type: string
          format: email
          example: serkan@example.edu
        createdAt:
          type: string
          format: date-time
    OrderCreateRequest:
      type: object
      additionalProperties: false
      required:
      - product
      - quantity
      - price
      properties:
        product:
          type: string
          minLength: 1
          example: quantum_compute_credit
        quantity:
          type: integer
          minimum: 1
          example: 10
        price:
          type: number
          minimum: 0
          example: 199.99
        currency:
          type: string
          minLength: 3
          maxLength: 3
          default: USD
          example: USD
    OrderResponse:
      type: object
      additionalProperties: false
      required:
      - orderId
      - product
      - quantity
      - price
      - currency
      - createdAt
      properties:
        orderId:
          type: string
          example: ord_01HZZYBG4J67D4Q5J1WJNSG8VX
        product:
          type: string
          example: quantum_compute_credit
        quantity:
          type: integer
          minimum: 1
        price:
          type: number
          minimum: 0
        currency:
          type: string
          minLength: 3
          maxLength: 3
        createdAt:
          type: string
          format: date-time
    Gate:
      type: object
      additionalProperties: false
      required:
      - type
      - targetQubit
      properties:
        type:
          type: string
          enum:
          - H
          - X
          - Y
          - Z
          - RX
          - RY
          - RZ
          - CNOT
          - CZ
          - SWAP
          - MEASURE
          example: H
        targetQubit:
          type: integer
          minimum: 0
          example: 0
        controlQubit:
          type: integer
          minimum: 0
          example: 0
        angle:
          type: number
          description: Rotation angle for parameterized gates
          example: 1.5708
    CircuitCreateRequest:
      type: object
      additionalProperties: false
      required:
      - qubits
      - gates
      properties:
        qubits:
          type: integer
          minimum: 1
          maximum: 128
          example: 2
        optimizationGoal:
          type: string
          enum:
          - minimum_depth
          - minimum_gate_count
          - fidelity
          default: minimum_depth
          example: minimum_depth
        gates:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Gate'
    CircuitCreateResponse:
      type: object
      additionalProperties: false
      required:
      - circuitId
      - qubits
      - status
      - optimization
      - createdAt
      properties:
        circuitId:
          type: string
          example: cir_01HZZYH8V2DFD9M8Y4WJB9P3J4
        qubits:
          type: integer
          minimum: 1
        status:
          type: string
          enum:
          - created
        optimization:
          type: object
          additionalProperties: false
          required:
          - reducedGateCount
          - depth
          properties:
            reducedGateCount:
              type: integer
              minimum: 0
              example: 0
            depth:
              type: integer
              minimum: 1
              example: 2
        createdAt:
          type: string
          format: date-time
    CircuitResource:
      type: object
      additionalProperties: false
      required:
      - circuitId
      - qubits
      - status
      - gates
      - createdAt
      properties:
        circuitId:
          type: string
        qubits:
          type: integer
          minimum: 1
        status:
          type: string
          enum:
          - created
          - optimized
          - simulated
        gates:
          type: array
          items:
            $ref: '#/components/schemas/Gate'
