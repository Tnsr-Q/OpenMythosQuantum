openapi: 3.1.0
info:
  title: Katopu Quantum AGI API
  summary: Patched production-ready unified API with verification workflows, async execution, feedback capture, release controls, and webhooks.
  description: "This contract consolidates the draft APIs into a stricter production-oriented interface and patches the gaps identified during validity review.\n\nPatched design choices:\n  - explicit versioned base path\n  - normalized resource naming\n  - unique operationIds\n  - reusable components under #/components/schemas\n  - explicit authentication and authorization\n  - stricter request/response schemas\n  - deterministic verification workflow for LLM-assisted optimization\n  - asynchronous request-reply pattern for heavy simulations\n  - webhooks for long-running operations and alerts\n  - cleaned schema examples and JSON Schema Draft 2020-12 nullable handling\n"
  version: 1.1.0
  contact:
    name: Serkan Kündem
    email: serkan.kundem@erciyes.edu.tr
    url: https://orcid.org/0000-0003-0784-0152
  license:
    name: Proprietary - review before production use
    url: https://orcid.org/0000-0003-0784-0152
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
servers:
- url: https://api.{environment}.katopu.example.com/{basePath}
  description: Main API gateway
  variables:
    environment:
      default: prod
      enum:
      - prod
      - staging
      - dev
    basePath:
      default: v1
- url: https://{region}.api.{environment}.katopu.example.com/{basePath}
  description: Regional API gateway
  variables:
    region:
      default: us
      enum:
      - us
      - eu
      - ap
    environment:
      default: prod
      enum:
      - prod
      - staging
    basePath:
      default: v1
tags:
- name: Health
- name: Users
- name: Orders
- name: Circuits
- name: Quantum
- name: Guidance
- name: Security
- name: Monitoring
- name: Updates
- name: Training
- name: Notifications
- name: AGI
- name: Analysis
- name: Feedback
- name: Versions
- name: Webhooks
security:
- BearerAuth: []
- ApiKeyAuth: []
paths:
  /healthz:
    get:
      tags:
      - Health
      operationId: getHealthStatus
      summary: Get service health
      description: Returns a lightweight health summary for load balancers and uptime checks.
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                ok:
                  value:
                    status: ok
                    version: 1.0.0
                    environment: prod
                    timestamp: '2026-04-22T12:00:00Z'
  /users:
    post:
      tags:
      - Users
      operationId: createUser
      summary: Create user
      description: Creates a new user account.
      security:
      - BearerAuth: []
      - OAuth2ClientCredentials:
        - users.write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
            examples:
              default:
                value:
                  username: skundem
                  email: serkan@example.edu
      responses:
        '201':
          description: User created
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              examples:
                created:
                  value:
                    userId: usr_01HZZY9V74N7R0H0V7S0A0B123
                    username: skundem
                    email: serkan@example.edu
                    createdAt: '2026-04-22T12:00:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /users/{userId}:
    parameters:
    - $ref: '#/components/parameters/UserId'
    get:
      tags:
      - Users
      operationId: getUserById
      summary: Get user by ID
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - users.read
      responses:
        '200':
          description: User found
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              examples:
                found:
                  value:
                    userId: usr_01HZZY9V74N7R0H0V7S0A0B123
                    username: skundem
                    email: serkan@example.edu
                    createdAt: '2026-04-22T12:00:00Z'
        '404':
          $ref: '#/components/responses/NotFound'
  /orders:
    post:
      tags:
      - Orders
      operationId: createOrder
      summary: Create order
      security:
      - BearerAuth: []
      - OAuth2ClientCredentials:
        - orders.write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
            examples:
              default:
                value:
                  product: quantum_compute_credit
                  quantity: 10
                  price: 199.99
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              examples:
                created:
                  value:
                    orderId: ord_01HZZYBG4J67D4Q5J1WJNSG8VX
                    product: quantum_compute_credit
                    quantity: 10
                    price: 199.99
                    currency: USD
                    createdAt: '2026-04-22T12:00:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
  /orders/{orderId}:
    parameters:
    - $ref: '#/components/parameters/OrderId'
    get:
      tags:
      - Orders
      operationId: getOrderById
      summary: Get order by ID
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - orders.read
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              examples:
                found:
                  value:
                    orderId: ord_01HZZYBG4J67D4Q5J1WJNSG8VX
                    product: quantum_compute_credit
                    quantity: 10
                    price: 199.99
                    currency: USD
                    createdAt: '2026-04-22T12:00:00Z'
        '404':
          $ref: '#/components/responses/NotFound'
  /circuits:
    post:
      tags:
      - Circuits
      operationId: createCircuit
      summary: Create a quantum circuit
      description: Creates a circuit definition with optional optimization preferences.
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - circuits.write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CircuitCreateRequest'
            examples:
              bellState:
                value:
                  qubits: 2
                  optimizationGoal: minimum_depth
                  gates:
                  - type: H
                    targetQubit: 0
                  - type: CNOT
                    controlQubit: 0
                    targetQubit: 1
      responses:
        '201':
          description: Circuit created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CircuitCreateResponse'
              examples:
                created:
                  value:
                    circuitId: cir_01HZZYH8V2DFD9M8Y4WJB9P3J4
                    qubits: 2
                    status: created
                    optimization:
                      reducedGateCount: 0
                      depth: 2
                    createdAt: '2026-04-22T12:00:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
  /circuits/{circuitId}:
    parameters:
    - $ref: '#/components/parameters/CircuitId'
    get:
      tags:
      - Circuits
      operationId: getCircuitById
      summary: Get circuit by ID
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - circuits.read
      responses:
        '200':
          description: Circuit found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CircuitResource'
              examples:
                found:
                  value:
                    circuitId: cir_01HZZYH8V2DFD9M8Y4WJB9P3J4
                    qubits: 2
                    status: created
                    gates:
                    - type: H
                      targetQubit: 0
                    - type: CNOT
                      controlQubit: 0
                      targetQubit: 1
                    createdAt: '2026-04-22T12:00:00Z'
        '404':
          $ref: '#/components/responses/NotFound'
  /circuits/{circuitId}/simulate:
    parameters:
    - $ref: '#/components/parameters/CircuitId'
    post:
      tags:
      - Circuits
      - Quantum
      operationId: simulateCircuit
      summary: Simulate a circuit
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - circuits.execute
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CircuitSimulationRequest'
            examples:
              shots:
                value:
                  shots: 1000
      responses:
        '200':
          description: Simulation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationResult'
              examples:
                bellState:
                  value:
                    circuitId: cir_01HZZYH8V2DFD9M8Y4WJB9P3J4
                    shots: 1000
                    probabilities:
                      '00': 0.5
                      '11': 0.5
                    histogram:
                      '00': 497
                      '11': 503
                    completedAt: '2026-04-22T12:01:00Z'
        '404':
          $ref: '#/components/responses/NotFound'
  /circuits/{circuitId}/optimize:
    parameters:
    - $ref: '#/components/parameters/CircuitId'
    post:
      tags:
      - Circuits
      - AGI
      operationId: optimizeCircuit
      summary: Optimize a circuit
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - circuits.write
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CircuitOptimizationRequest'
            examples:
              default:
                value:
                  objective: fidelity
      responses:
        '200':
          description: Optimization completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationResult'
              examples:
                verified:
                  value:
                    originalCircuitId: cir_01HZZYH8V2DFD9M8Y4WJB9P3J4
                    optimizedCircuitId: cir_01HZZYJ2DS44A6N9J23NT2K5A1
                    objective: fidelity
                    reducedGateCount: 1
                    originalDepth: 3
                    optimizedDepth: 2
                    estimatedFidelity: 0.993
                    verification:
                      verificationId: ver_01HZZA1B2C3D4E5F6G7H8J9K0L
                      status: passed
                      unitarityPreserved: true
                      equivalenceChecked: true
                      residualError: 0.0001
                      notes:
                      - Unitary constraints verified.
                      - State equivalence passed on classical simulator.
        '404':
          $ref: '#/components/responses/NotFound'
      description: Optimizes a circuit and returns a deterministic verification summary. Optimized output must pass unitarity, equivalence, and hardware-constraint checks before being returned.
  /quantum/jobs:
    post:
      tags:
      - Quantum
      operationId: createQuantumJob
      summary: Submit a quantum computation job
      description: Creates a compute job from a QASM circuit or a structured circuit definition.
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - quantum.execute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuantumJobCreateRequest'
            examples:
              qasm:
                value:
                  qasm: 'OPENQASM 2.0;

                    include "qelib1.inc";

                    qreg q[2];

                    creg c[2];

                    h q[0];

                    cx q[0],q[1];

                    measure q -> c;

                    '
      responses:
        '202':
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuantumJobAcceptedResponse'
              examples:
                accepted:
                  value:
                    jobId: qjob_01HZZYQJK5SM0Q4MB4J1F96M6B
                    status: queued
                    submittedAt: '2026-04-22T12:00:00Z'
  /quantum/jobs/{jobId}:
    parameters:
    - $ref: '#/components/parameters/JobId'
    get:
      tags:
      - Quantum
      operationId: getQuantumJobById
      summary: Get quantum job status
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - quantum.read
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuantumJobResponse'
              examples:
                complete:
                  value:
                    jobId: qjob_01HZZYQJK5SM0Q4MB4J1F96M6B
                    status: completed
                    result:
                      fidelity: 0.981
                      measurements:
                        '00': 0.49
                        '11': 0.51
                    startedAt: '2026-04-22T12:00:20Z'
                    completedAt: '2026-04-22T12:01:05Z'
        '404':
          $ref: '#/components/responses/NotFound'
  /guidance/assist:
    post:
      tags:
      - Guidance
      operationId: generateGuidance
      summary: Generate guided assistance
      description: Produces step-by-step guidance based on target goal and experience level.
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - guidance.read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuidanceRequest'
            examples:
              beginnerBell:
                value:
                  targetGoal: high_fidelity
                  experienceLevel: beginner
                  userPrompt: Help me build a Bell-state circuit.
      responses:
        '200':
          description: Guidance generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuidanceResponse'
              examples:
                beginnerBell:
                  value:
                    steps:
                    - Apply a Hadamard gate to qubit 0.
                    - Apply a CNOT gate from qubit 0 to qubit 1.
                    - Simulate the circuit with 1000 shots.
                    totalSteps: 3
                    completionStatus: completed
  /security/encrypt:
    post:
      tags:
      - Security
      operationId: encryptPayload
      summary: Encrypt payload
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - security.write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EncryptRequest'
            examples:
              default:
                value:
                  data: sensitive payload
      responses:
        '200':
          description: Payload encrypted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EncryptResponse'
              examples:
                encrypted:
                  value:
                    encryptedData: base64:c2VjdXJlLWJsb2I=
                    algorithm: aes-256-gcm
                    keyId: key_2026_04
  /security/decrypt:
    post:
      tags:
      - Security
      operationId: decryptPayload
      summary: Decrypt payload
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - security.write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecryptRequest'
            examples:
              default:
                value:
                  encryptedData: base64:c2VjdXJlLWJsb2I=
      responses:
        '200':
          description: Payload decrypted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecryptResponse'
              examples:
                decrypted:
                  value:
                    data: sensitive payload
                    status: decrypted
  /monitoring/security:
    post:
      tags:
      - Monitoring
      - Security
      operationId: runSecurityMonitoring
      summary: Run security monitoring
      description: Triggers an authenticated security monitoring cycle.
      security:
      - OAuth2ClientCredentials:
        - monitoring.write
      responses:
        '200':
          description: Monitoring completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityMonitoringResponse'
              examples:
                completed:
                  value:
                    securityStatus: healthy
                    findings: []
                    message: Security monitoring completed successfully.
  /monitoring/performance:
    post:
      tags:
      - Monitoring
      operationId: runPerformanceMonitoring
      summary: Run performance monitoring
      security:
      - OAuth2ClientCredentials:
        - monitoring.write
      responses:
        '200':
          description: Monitoring completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceMonitoringResponse'
              examples:
                completed:
                  value:
                    performanceStatus: stable
                    p95LatencyMs: 187
                    errorRate: 0.002
                    message: Performance monitoring completed successfully.
  /updates/check:
    get:
      tags:
      - Updates
      operationId: checkForSystemUpdates
      summary: Check for system updates
      security:
      - BearerAuth: []
      - OAuth2ClientCredentials:
        - updates.read
      responses:
        '200':
          description: Update status returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateCheckResponse'
              examples:
                available:
                  value:
                    updatesAvailable: true
                    currentVersion: 1.0.0
                    latestVersion: 1.0.3
  /updates/apply:
    post:
      tags:
      - Updates
      operationId: applySystemUpdates
      summary: Apply system updates
      security:
      - OAuth2ClientCredentials:
        - updates.write
      responses:
        '200':
          description: Update applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateApplyResponse'
              examples:
                applied:
                  value:
                    success: true
                    version: 1.0.3
                    message: Update completed successfully.
  /agi/self-improvement/runs:
    post:
      tags:
      - AGI
      operationId: startSelfImprovementRun
      summary: Start self-improvement run
      description: Starts a controlled AGI self-improvement cycle.
      security:
      - OAuth2ClientCredentials:
        - agi.write
      responses:
        '202':
          description: Run accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
              examples:
                accepted:
                  value:
                    message: Self-improvement run accepted.
  /training/jobs:
    post:
      tags:
      - Training
      operationId: createTrainingJob
      summary: Create training job
      security:
      - BearerAuth: []
      - OAuth2ClientCredentials:
        - training.write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainingCreateRequest'
            examples:
              default:
                value:
                  modelType: transformer
                  datasetName: custom-dataset
                  taskType: text-generation
                  numEpochs: 5
                  batchSize: 16
                  learningRate: 3.0e-05
                  saveModel: true
      responses:
        '202':
          description: Training job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingAcceptedResponse'
              examples:
                accepted:
                  value:
                    trainingId: trn_01HZZZ6JTK98FCG73RBTQ2P5EJ
                    status: queued
                    submittedAt: '2026-04-22T12:00:00Z'
  /training/jobs/{trainingId}:
    parameters:
    - $ref: '#/components/parameters/TrainingId'
    get:
      tags:
      - Training
      operationId: getTrainingJobById
      summary: Get training job status
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - training.read
      responses:
        '200':
          description: Training job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingJobResponse'
              examples:
                running:
                  value:
                    trainingId: trn_01HZZZ6JTK98FCG73RBTQ2P5EJ
                    status: running
                    progress: 72.5
                    currentEpoch: 3
                    totalEpochs: 5
                    currentLoss: 0.0264
        '404':
          $ref: '#/components/responses/NotFound'
  /training/jobs/{trainingId}/stop:
    parameters:
    - $ref: '#/components/parameters/TrainingId'
    post:
      tags:
      - Training
      operationId: stopTrainingJob
      summary: Stop training job
      security:
      - BearerAuth: []
      - OAuth2ClientCredentials:
        - training.write
      responses:
        '200':
          description: Training stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
              examples:
                stopped:
                  value:
                    message: Training has been stopped.
        '404':
          $ref: '#/components/responses/NotFound'
  /training/jobs/{trainingId}/results:
    parameters:
    - $ref: '#/components/parameters/TrainingId'
    get:
      tags:
      - Training
      operationId: getTrainingResultsById
      summary: Get training results
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - training.read
      responses:
        '200':
          description: Training results returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingResultsResponse'
              examples:
                complete:
                  value:
                    trainingId: trn_01HZZZ6JTK98FCG73RBTQ2P5EJ
                    status: completed
                    finalLoss: 0.0178
                    evaluationMetrics:
                      accuracy: 0.94
                      f1Score: 0.91
                      precision: 0.91
                      recall: 0.93
                    savedModelPath: /models/transformer-v1
        '404':
          $ref: '#/components/responses/NotFound'
  /training/jobs/{trainingId}/recommendations:
    parameters:
    - $ref: '#/components/parameters/TrainingId'
    get:
      tags:
      - Training
      operationId: getTrainingRecommendationsById
      summary: Get training recommendations
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - training.read
      responses:
        '200':
          description: Recommendations returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingRecommendationResponse'
              examples:
                default:
                  value:
                    trainingId: trn_01HZZZ6JTK98FCG73RBTQ2P5EJ
                    learningRate: 2.0e-05
                    batchSize: 32
                    message: Lower learning rate to improve convergence.
  /training/jobs/{trainingId}/analytics:
    parameters:
    - $ref: '#/components/parameters/TrainingId'
    get:
      tags:
      - Training
      operationId: getTrainingAnalyticsById
      summary: Get training analytics
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - training.read
      responses:
        '200':
          description: Analytics returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingAnalyticsResponse'
              examples:
                default:
                  value:
                    trainingId: trn_01HZZZ6JTK98FCG73RBTQ2P5EJ
                    epoch: 2
                    loss: 0.034
                    accuracy: 0.87
                    message: Epoch analytics data retrieved.
  /dashboard/metrics:
    get:
      tags:
      - Training
      operationId: getDashboardMetrics
      summary: Get dashboard metrics
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - training.read
      parameters:
      - $ref: '#/components/parameters/TrainingIdQuery'
      responses:
        '200':
          description: Dashboard metrics returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardMetricsResponse'
              examples:
                default:
                  value:
                    trainingId: trn_01HZZZ6JTK98FCG73RBTQ2P5EJ
                    progress: 85.5
                    accuracy: 0.92
                    loss: 0.05
                    timeRemaining: 1h 15m
                    recommendations:
                    - Increase batch size to stabilize gradients.
  /notifications:
    post:
      tags:
      - Notifications
      operationId: createNotificationSubscription
      summary: Create notification subscription
      security:
      - BearerAuth: []
      - OAuth2ClientCredentials:
        - notifications.write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationCreateRequest'
            examples:
              email:
                value:
                  userId: usr_01HZZY9V74N7R0H0V7S0A0B123
                  trainingId: trn_01HZZZ6JTK98FCG73RBTQ2P5EJ
                  notificationType: email
                  thresholds:
                    accuracyChange: 0.05
                    lossChange: 0.01
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
              examples:
                created:
                  value:
                    message: Notification subscription created.
