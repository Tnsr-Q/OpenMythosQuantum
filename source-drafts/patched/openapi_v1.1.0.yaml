      - required:
        - qasm
      - required:
        - qubits
        - gates
      properties:
        qasm:
          type: string
          minLength: 1
        qubits:
          type: integer
          minimum: 1
          maximum: 128
        gates:
          type: array
          items:
            $ref: '#/components/schemas/Gate'
