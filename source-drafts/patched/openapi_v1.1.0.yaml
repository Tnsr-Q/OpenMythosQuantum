          type: string
          format: date-time
    CircuitSimulationRequest:
      type: object
      additionalProperties: false
      properties:
        shots:
          type: integer
          minimum: 1
          maximum: 100000
          default: 1000
          example: 1000
    CircuitOptimizationRequest:
      type: object
      additionalProperties: false
      properties:
        objective:
          type: string
          enum:
          - fidelity
          - minimum_depth
          - minimum_gate_count
          default: fidelity
          example: fidelity
    SimulationResult:
      type: object
      additionalProperties: false
      required:
      - circuitId
      - shots
      - probabilities
      - histogram
      - completedAt
      properties:
        circuitId:
          type: string
          example: cir_01HZZYH8V2DFD9M8Y4WJB9P3J4
        shots:
          type: integer
          minimum: 1
          example: 1000
        probabilities:
          type: object
          additionalProperties:
            type: number
          example:
            '00': 0.5
            '11': 0.5
        histogram:
          type: object
          additionalProperties:
            type: integer
          example:
            '00': 497
            '11': 503
        completedAt:
          type: string
          format: date-time
        dominantState:
          type:
          - string
          - 'null'
          example: '11'
        hardwareExecutionId:
          type:
          - string
          - 'null'
          example: null
    OptimizationResult:
      type: object
      additionalProperties: false
      required:
      - originalCircuitId
      - optimizedCircuitId
      - objective
      - reducedGateCount
      - originalDepth
      - optimizedDepth
      - estimatedFidelity
      - verification
      properties:
        originalCircuitId:
          type: string
          example: cir_01HZZYH8V2DFD9M8Y4WJB9P3J4
        optimizedCircuitId:
          type: string
          example: cir_01HZZYJ2DS44A6N9J23NT2K5A1
        objective:
          type: string
          enum:
          - fidelity
          - minimum_depth
          - minimum_gate_count
        reducedGateCount:
          type: integer
          minimum: 0
          example: 1
        originalDepth:
          type: integer
          minimum: 1
          example: 3
        optimizedDepth:
          type: integer
          minimum: 1
          example: 2
        estimatedFidelity:
          type: number
          minimum: 0
          maximum: 1
          example: 0.993
        verification:
          $ref: '#/components/schemas/VerificationSummary'
    QuantumJobCreateRequest:
      type: object
      additionalProperties: false
