        jobId:
          type: string
          example: qjob_01HZZYQJK5SM0Q4MB4J1F96M6B
        status:
          type: string
          enum:
          - queued
        submittedAt:
          type: string
          format: date-time
    QuantumJobResponse:
      type: object
      additionalProperties: false
      required:
      - jobId
      - status
