  /training/jobs/{trainingId}/freeze:
    parameters:
    - $ref: '#/components/parameters/TrainingId'
    post:
      tags:
      - Training
      operationId: freezeTrainingJob
      summary: Freeze a training job configuration to a deterministic content hash
      description: |
        Computes a deterministic `freeze:<sha256>` identity over the canonical
        JSON serialization of the training job configuration (model name,
        dataset identifier, hyperparameters, seed, schema version). The
        freeze hash is idempotent: repeated calls on an unchanged
        configuration return the same hash.

        Freeze hashes are **content** hashes, distinct from `trainingId`
        (which is a mutable pointer). Use freeze hashes for experiment
        reproducibility, audit trails, and result caching.
      security:
      - BearerAuth: []
      - OAuth2ClientCredentials:
        - training.freeze
      responses:
        '200':
          description: Freeze hash computed (or returned unchanged if the configuration has not been modified).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreezeResponse'
              examples:
                trainingFrozen:
                  value:
                    resourceId: trn_01HZZZ6JTK98FCG73RBTQ2P5EJ
                    resourceKind: training_job
                    freezeHash: freeze:2adea023c4b47899106b7aa01b52c94ebfa4985e64ecc8a1c481004fae69375f
                    algorithm: jcs-canonical-json+sha256
                    frozenAt: '2026-04-22T12:45:00Z'
                    canonicalBytes: 178
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
    get:
      tags:
      - Training
      operationId: getTrainingJobFreeze
      summary: Retrieve the current freeze hash for a training job
      description: |
        Returns the most recently computed freeze hash for the training job
        configuration. Returns 404 if the training job exists but has never
        been frozen.
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - training.read
      responses:
        '200':
          description: Current freeze hash
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreezeResponse'
              examples:
                current:
                  value:
                    resourceId: trn_01HZZZ6JTK98FCG73RBTQ2P5EJ
                    resourceKind: training_job
                    freezeHash: freeze:2adea023c4b47899106b7aa01b52c94ebfa4985e64ecc8a1c481004fae69375f
                    algorithm: jcs-canonical-json+sha256
                    frozenAt: '2026-04-22T12:45:00Z'
                    canonicalBytes: 178
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
