      responses:
        '200':
          description: Verification result (integrity may be match or mismatch; inspect `verified`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginIntegrityVerification'
              examples:
                match:
                  value:
                    pluginId: sha256_verifier
                    verified: true
                    algorithm: sha256
                    expected: sha256:e8635e8a008a58f0832fca25670d46037fb4b16a1f30cbed1de6f5ff5e095e03
                    computed: sha256:e8635e8a008a58f0832fca25670d46037fb4b16a1f30cbed1de6f5ff5e095e03
                    verifiedAt: '2026-04-22T12:45:00Z'
                mismatch:
                  value:
                    pluginId: sha256_verifier
                    verified: false
                    algorithm: sha256
                    expected: sha256:e8635e8a008a58f0832fca25670d46037fb4b16a1f30cbed1de6f5ff5e095e03
                    computed: sha256:deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef
                    verifiedAt: '2026-04-22T12:45:00Z'
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://auth.katopu.example.com/oauth2/token
          scopes:
            users.read: Read users
            users.write: Write users
            orders.read: Read orders
            orders.write: Write orders
            circuits.read: Read circuits
            circuits.write: Write circuits
            circuits.execute: Execute circuits
            circuits.freeze: Freeze a circuit to a deterministic content hash
            quantum.read: Read quantum jobs
            quantum.execute: Execute quantum jobs
            guidance.read: Read guidance
            security.write: Encrypt/decrypt data
            monitoring.write: Run monitoring operations
            updates.read: Read system updates
            updates.write: Apply system updates
            training.read: Read training jobs
            training.write: Write training jobs
            training.freeze: Freeze a training job configuration to a deterministic content hash
            notifications.write: Write notifications
            agi.write: Run AGI operations
            plugins.read: Read plugin registry descriptors and discover by capability
            plugins.verify: Verify plugin integrity on demand
  headers:
    XRequestId:
      description: Correlation ID for request tracing
      schema:
        type: string
        example: req_01HZZZXKZX7EP7DAX2GN9CT7R9
    XRateLimitLimit:
      description: Rate limit ceiling for the current window.
      schema:
        type: integer
        minimum: 1
        example: 120
    XRateLimitRemaining:
      description: Remaining requests in the current window.
      schema:
        type: integer
        minimum: 0
        example: 119
    XRateLimitReset:
      description: UTC epoch seconds when the window resets.
      schema:
        type: integer
        minimum: 0
        example: 1776868800
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        pattern: ^usr_[A-Za-z0-9]+$
      description: User identifier
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
        pattern: ^ord_[A-Za-z0-9]+$
      description: Order identifier
    CircuitId:
      name: circuitId
      in: path
      required: true
      schema:
        type: string
        pattern: ^cir_[A-Za-z0-9]+$
      description: Circuit identifier
    TrainingId:
      name: trainingId
      in: path
      required: true
      schema:
        type: string
        pattern: ^trn_[A-Za-z0-9]+$
      description: Training job identifier
    TrainingIdQuery:
      name: trainingId
      in: query
      required: true
      schema:
        type: string
        pattern: ^trn_[A-Za-z0-9]+$
      description: Training job identifier
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
        pattern: ^qjob_[A-Za-z0-9]+$
      description: Quantum job identifier
    PluginId:
      name: pluginId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-z][a-z0-9_]{2,63}$
      description: Plugin identifier (matches descriptor `id`).
    Capability:
      name: capability
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/PluginCapability'
      description: Capability name (e.g. `webhook.verify.sha256`).
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Client-provided unique key to safely retry idempotent POST operations without duplicating side effects.
      schema:
        type: string
        minLength: 8
        maxLength: 128
        pattern: ^[A-Za-z0-9._:-]+$
      example: idem_01HZZZZEXAMPLE0001
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque pagination cursor from a previous response.
      schema:
        type: string
        minLength: 1
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of records to return in one page.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            badRequest:
              value:
                requestId: req_01HZZZXKZX7EP7DAX2GN9CT7R9
                error:
                  code: bad_request
                  message: Request body failed validation.
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            notFound:
              value:
                requestId: req_01HZZZXKZX7EP7DAX2GN9CT7R9
                error:
                  code: not_found
                  message: Requested resource was not found.
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            conflict:
              value:
                requestId: req_01HZZZXKZX7EP7DAX2GN9CT7R9
                error:
                  code: conflict
                  message: Resource already exists.
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but not permitted
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            internalError:
              value:
                requestId: req_01HZZZXKZX7EP7DAX2GN9CT7R9
                error:
                  code: internal_error
                  message: An unexpected error occurred.
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
      - status
      - version
      - environment
      - timestamp
      properties:
        status:
          type: string
          enum:
          - ok
        version:
          type: string
        environment:
          type: string
          enum:
          - dev
          - staging
          - prod
        timestamp:
          type: string
          format: date-time
    ErrorDetail:
      type: object
      additionalProperties: false
      required:
      - code
      - message
      properties:
        code:
          type: string
          example: bad_request
        message:
          type: string
          example: Request body failed validation.
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
      - requestId
      - error
      properties:
        requestId:
          type: string
          example: req_01HZZZXKZX7EP7DAX2GN9CT7R9
        error:
          $ref: '#/components/schemas/ErrorDetail'
    SuccessMessage:
      type: object
      additionalProperties: false
      required:
      - message
      properties:
        message:
          type: string
          example: Operation completed successfully.
    UserCreateRequest:
      type: object
      additionalProperties: false
      required:
      - username
      - email
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
          pattern: ^[a-zA-Z0-9._-]+$
          example: tjacobsen
        email:
          type: string
          format: email
          example: tnsr_q@icloud.com
    UserResponse:
      type: object
      additionalProperties: false
      required:
      - userId
      - username
      - email
      - createdAt
      properties:
        userId:
          type: string
          example: usr_01HZZY9V74N7R0H0V7S0A0B123
        username:
          type: string
          example: tjacobsen
        email:
          type: string
          format: email
          example: tnsr_q@icloud.com
        createdAt:
          type: string
          format: date-time
    OrderCreateRequest:
      type: object
      additionalProperties: false
      required:
      - product
      - quantity
      - price
      properties:
        product:
          type: string
          minLength: 1
          example: quantum_compute_credit
        quantity:
          type: integer
          minimum: 1
          example: 10
        price:
          type: number
          minimum: 0
          example: 199.99
        currency:
          type: string
          minLength: 3
          maxLength: 3
          default: USD
          example: USD
    OrderResponse:
      type: object
      additionalProperties: false
      required:
      - orderId
      - product
      - quantity
      - price
      - currency
      - createdAt
      properties:
        orderId:
          type: string
          example: ord_01HZZYBG4J67D4Q5J1WJNSG8VX
        product:
          type: string
          example: quantum_compute_credit
        quantity:
          type: integer
          minimum: 1
        price:
          type: number
          minimum: 0
        currency:
          type: string
          minLength: 3
          maxLength: 3
        createdAt:
          type: string
          format: date-time
    Gate:
      type: object
      additionalProperties: false
      required:
      - type
      - targetQubit
      properties:
        type:
          type: string
          enum:
          - H
          - X
          - Y
          - Z
          - RX
          - RY
          - RZ
          - CNOT
          - CZ
          - SWAP
          - MEASURE
          example: H
        targetQubit:
          type: integer
          minimum: 0
          example: 0
        controlQubit:
          type: integer
          minimum: 0
          example: 0
        angle:
          type: number
          description: Rotation angle for parameterized gates
          example: 1.5708
    CircuitCreateRequest:
      type: object
      additionalProperties: false
      required:
      - qubits
      - gates
      properties:
        qubits:
          type: integer
          minimum: 1
          maximum: 128
          example: 2
        optimizationGoal:
          type: string
          enum:
          - minimum_depth
          - minimum_gate_count
          - fidelity
          default: minimum_depth
          example: minimum_depth
        gates:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Gate'
    CircuitCreateResponse:
      type: object
      additionalProperties: false
      required:
      - circuitId
      - qubits
      - status
      - optimization
      - createdAt
      properties:
        circuitId:
          type: string
          example: cir_01HZZYH8V2DFD9M8Y4WJB9P3J4
        qubits:
          type: integer
          minimum: 1
        status:
          type: string
          enum:
          - created
        optimization:
          type: object
          additionalProperties: false
          required:
          - reducedGateCount
          - depth
          properties:
            reducedGateCount:
              type: integer
              minimum: 0
              example: 0
            depth:
              type: integer
              minimum: 1
              example: 2
        createdAt:
          type: string
          format: date-time
        freezeHash:
          allOf:
          - $ref: '#/components/schemas/FreezeHash'
          readOnly: true
          description: Optional deterministic content hash (see POST /circuits/{circuitId}/freeze). Present only after the circuit has been frozen.
    CircuitResource:
      type: object
      additionalProperties: false
      required:
      - circuitId
      - qubits
      - status
      - gates
      - createdAt
      properties:
        circuitId:
          type: string
        qubits:
          type: integer
          minimum: 1
        status:
          type: string
          enum:
          - created
          - optimized
          - simulated
        gates:
          type: array
          items:
            $ref: '#/components/schemas/Gate'
        createdAt:
          type: string
          format: date-time
        freezeHash:
          allOf:
          - $ref: '#/components/schemas/FreezeHash'
          readOnly: true
          description: Optional deterministic content hash for this circuit (see POST /circuits/{circuitId}/freeze). Present only after the circuit has been frozen.
    CircuitSimulationRequest:
      type: object
      additionalProperties: false
      properties:
        shots:
          type: integer
          minimum: 1
          maximum: 100000
          default: 1000
          example: 1000
    CircuitOptimizationRequest:
      type: object
      additionalProperties: false
      properties:
        objective:
          type: string
          enum:
          - fidelity
          - minimum_depth
          - minimum_gate_count
          default: fidelity
          example: fidelity
    SimulationResult:
      type: object
      additionalProperties: false
      required:
      - circuitId
      - shots
      - probabilities
      - histogram
      - completedAt
      properties:
        circuitId:
          type: string
          example: cir_01HZZYH8V2DFD9M8Y4WJB9P3J4
        shots:
          type: integer
          minimum: 1
          example: 1000
        probabilities:
          type: object
          additionalProperties:
            type: number
          example:
            '00': 0.5
            '11': 0.5
        histogram:
          type: object
          additionalProperties:
            type: integer
          example:
            '00': 497
            '11': 503
        completedAt:
          type: string
          format: date-time
    OptimizationResult:
      type: object
      additionalProperties: false
      required:
      - originalCircuitId
      - optimizedCircuitId
      - objective
      - reducedGateCount
      - originalDepth
      - optimizedDepth
      - estimatedFidelity
      properties:
        originalCircuitId:
          type: string
          example: cir_01HZZYH8V2DFD9M8Y4WJB9P3J4
        optimizedCircuitId:
          type: string
          example: cir_01HZZYJ2DS44A6N9J23NT2K5A1
        objective:
          type: string
          enum:
          - fidelity
          - minimum_depth
          - minimum_gate_count
        reducedGateCount:
          type: integer
          minimum: 0
          example: 1
        originalDepth:
          type: integer
          minimum: 1
          example: 3
        optimizedDepth:
          type: integer
          minimum: 1
          example: 2
        estimatedFidelity:
          type: number
          minimum: 0
          maximum: 1
          example: 0.993
    QuantumJobCreateRequest:
      type: object
      additionalProperties: false
      oneOf:
      - required:
        - qasm
      - required:
        - qubits
        - gates
      properties:
        qasm:
          type: string
          minLength: 1
        qubits:
          type: integer
          minimum: 1
          maximum: 128
        gates:
          type: array
          items:
            $ref: '#/components/schemas/Gate'
        parameters:
          type: object
          additionalProperties: true
    QuantumJobAcceptedResponse:
      type: object
      additionalProperties: false
      required:
      - jobId
      - status
      - submittedAt
      properties:
        jobId:
          type: string
          example: qjob_01HZZYQJK5SM0Q4MB4J1F96M6B
        status:
          type: string
          enum:
          - queued
        submittedAt:
          type: string
          format: date-time
    QuantumJobResponse:
      type: object
      additionalProperties: false
      required:
      - jobId
      - status
      properties:
        jobId:
          type: string
          example: qjob_01HZZYQJK5SM0Q4MB4J1F96M6B
        status:
          type: string
          enum:
          - queued
          - running
          - completed
          - failed
        result:
          type: object
          additionalProperties: false
          properties:
            fidelity:
              type: number
              minimum: 0
              maximum: 1
              example: 0.981
            measurements:
              type: object
              additionalProperties:
                type: number
              example:
                '00': 0.49
                '11': 0.51
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
    GuidanceRequest:
      type: object
      additionalProperties: false
      required:
      - targetGoal
      - experienceLevel
      properties:
        targetGoal:
          type: string
          enum:
          - minimum_depth
          - high_fidelity
          - low_gate_count
          example: high_fidelity
        experienceLevel:
          type: string
          enum:
          - beginner
          - intermediate
          - advanced
          example: beginner
        userPrompt:
          type: string
          maxLength: 2000
          example: Help me build a Bell-state circuit.
    GuidanceResponse:
      type: object
      additionalProperties: false
      required:
      - steps
      - totalSteps
      - completionStatus
      properties:
        steps:
          type: array
          minItems: 1
          items:
            type: string
          example:
          - Apply a Hadamard gate to qubit 0.
          - Apply a CNOT gate from qubit 0 to qubit 1.
          - Simulate the circuit with 1000 shots.
        totalSteps:
          type: integer
          minimum: 1
          example: 3
        completionStatus:
          type: string
          enum:
          - completed
          - in_progress
          - failed
          example: completed
    EncryptRequest:
      type: object
      additionalProperties: false
      required:
      - data
      properties:
        data:
          type: string
          minLength: 1
          example: sensitive payload
    EncryptResponse:
      type: object
      additionalProperties: false
      required:
      - encryptedData
      - algorithm
      - keyId
      properties:
        encryptedData:
          type: string
          example: base64:c2VjdXJlLWJsb2I=
        algorithm:
          type: string
          example: aes-256-gcm
        keyId:
          type: string
          example: key_2026_04
    DecryptRequest:
      type: object
      additionalProperties: false
      required:
      - encryptedData
      properties:
        encryptedData:
          type: string
          minLength: 1
          example: base64:c2VjdXJlLWJsb2I=
    DecryptResponse:
      type: object
      additionalProperties: false
      required:
      - data
      - status
      properties:
        data:
          type: string
          example: sensitive payload
        status:
          type: string
          enum:
          - decrypted
    SecurityMonitoringResponse:
      type: object
      additionalProperties: false
      required:
      - securityStatus
      - findings
      - message
      properties:
        securityStatus:
          type: string
          enum:
          - healthy
          - degraded
          - critical
          example: healthy
        findings:
          type: array
          items:
            type: string
          example: []
        message:
          type: string
          example: Security monitoring completed successfully.
    PerformanceMonitoringResponse:
      type: object
      additionalProperties: false
      required:
      - performanceStatus
      - p95LatencyMs
      - errorRate
      - message
      properties:
        performanceStatus:
          type: string
          enum:
          - stable
          - degraded
          - critical
          example: stable
        p95LatencyMs:
          type: integer
          minimum: 0
          example: 187
        errorRate:
          type: number
          minimum: 0
          maximum: 1
          example: 0.002
        message:
          type: string
          example: Performance monitoring completed successfully.
    UpdateCheckResponse:
      type: object
      additionalProperties: false
      required:
      - updatesAvailable
      - currentVersion
      - latestVersion
      properties:
        updatesAvailable:
          type: boolean
          example: true
        currentVersion:
          type: string
          example: 1.0.0
        latestVersion:
          type: string
          example: 1.0.3
    UpdateApplyResponse:
      type: object
      additionalProperties: false
      required:
      - success
      - version
      - message
      properties:
        success:
          type: boolean
          example: true
        version:
          type: string
          example: 1.0.3
        message:
          type: string
          example: Update completed successfully.
    TrainingCreateRequest:
      type: object
      additionalProperties: false
      required:
      - modelType
      - datasetName
      - taskType
      - numEpochs
      - batchSize
      - learningRate
      - saveModel
      properties:
        modelType:
          type: string
          example: transformer
        datasetName:
          type: string
          example: custom-dataset
        taskType:
          type: string
          enum:
          - text-generation
          - classification
          - regression
          example: text-generation
        numEpochs:
          type: integer
          minimum: 1
          example: 5
        batchSize:
          type: integer
          minimum: 1
          example: 16
        learningRate:
          type: number
          exclusiveMinimum: 0
          example: 3.0e-05
        saveModel:
          type: boolean
          example: true
        savePath:
          type: string
          example: /models/transformer-v1
        modelName:
          type: string
          enum:
          - gpt-4-turbo
          - claude-3-opus
          - gemini-1.5-pro
          - llama-3.1-70b-instruct
          default: gpt-4-turbo
          example: gpt-4-turbo
          description: Base foundation model used for training initialization or adapter tuning.
        modelProvider:
          type: string
          enum:
          - openai
          - anthropic
          - google
          - meta
          default: openai
          example: openai
    TrainingAcceptedResponse:
      type: object
      additionalProperties: false
      required:
      - trainingId
      - status
      - submittedAt
      properties:
        trainingId:
          type: string
          example: trn_01HZZZ6JTK98FCG73RBTQ2P5EJ
        status:
          type: string
          enum:
          - queued
        submittedAt:
          type: string
          format: date-time
    TrainingJobResponse:
      type: object
      additionalProperties: false
      required:
      - trainingId
      - status
      - progress
      - currentEpoch
      - totalEpochs
      - currentLoss
      properties:
        trainingId:
          type: string
          example: trn_01HZZZ6JTK98FCG73RBTQ2P5EJ
        status:
          type: string
          enum:
          - queued
          - running
          - completed
          - failed
          - stopped
        progress:
          type: number
          minimum: 0
          maximum: 100
          example: 72.5
        currentEpoch:
          type: integer
          minimum: 0
          example: 3
        totalEpochs:
          type: integer
          minimum: 1
          example: 5
        currentLoss:
          type: number
          minimum: 0
          example: 0.0264
        freezeHash:
          allOf:
          - $ref: '#/components/schemas/FreezeHash'
          readOnly: true
          description: Optional deterministic content hash of the training job configuration (see POST /training/jobs/{trainingId}/freeze). Present only after the training job has been frozen.
    TrainingResultsResponse:
      type: object
      additionalProperties: false
      required:
      - trainingId
      - status
      - finalLoss
      - evaluationMetrics
      properties:
        trainingId:
          type: string
          example: trn_01HZZZ6JTK98FCG73RBTQ2P5EJ
        status:
          type: string
          enum:
          - completed
        finalLoss:
          type: number
          minimum: 0
          example: 0.0178
        evaluationMetrics:
          type: object
          additionalProperties: false
          required:
          - accuracy
          - f1Score
          - precision
          - recall
          properties:
            accuracy:
              type: number
              minimum: 0
              maximum: 1
              example: 0.94
            f1Score:
              type: number
              minimum: 0
              maximum: 1
              example: 0.91
            precision:
              type: number
              minimum: 0
              maximum: 1
              example: 0.91
            recall:
              type: number
              minimum: 0
              maximum: 1
              example: 0.93
        savedModelPath:
          type: string
          example: /models/transformer-v1
        freezeHash:
          allOf:
          - $ref: '#/components/schemas/FreezeHash'
          readOnly: true
          description: Optional deterministic content hash of the training job configuration that produced these results. Present only after the training job has been frozen.
    TrainingRecommendationResponse:
      type: object
      additionalProperties: false
      required:
      - trainingId
      - learningRate
      - batchSize
      - message
      properties:
        trainingId:
          type: string
          example: trn_01HZZZ6JTK98FCG73RBTQ2P5EJ
        learningRate:
          type: number
          exclusiveMinimum: 0
          example: 2.0e-05
        batchSize:
          type: integer
          minimum: 1
          example: 32
        message:
          type: string
          example: Lower learning rate to improve convergence.
    TrainingAnalyticsResponse:
      type: object
      additionalProperties: false
      required:
      - trainingId
      - epoch
      - loss
      - accuracy
      - message
      properties:
        trainingId:
          type: string
          example: trn_01HZZZ6JTK98FCG73RBTQ2P5EJ
        epoch:
          type: integer
          minimum: 1
          example: 2
        loss:
          type: number
          minimum: 0
          example: 0.034
        accuracy:
          type: number
          minimum: 0
          maximum: 1
          example: 0.87
        message:
          type: string
          example: Epoch analytics data retrieved.
    DashboardMetricsResponse:
      type: object
      additionalProperties: false
      required:
      - trainingId
      - progress
      - accuracy
      - loss
      - timeRemaining
      - recommendations
      properties:
        trainingId:
          type: string
          example: trn_01HZZZ6JTK98FCG73RBTQ2P5EJ
        progress:
          type: number
          minimum: 0
          maximum: 100
          example: 85.5
        accuracy:
          type: number
          minimum: 0
          maximum: 1
          example: 0.92
        loss:
          type: number
          minimum: 0
          example: 0.05
        timeRemaining:
          type: string
          example: 1h 15m
        recommendations:
          type: array
          items:
            type: string
          example:
          - Increase batch size to stabilize gradients.
    NotificationThresholds:
      type: object
      additionalProperties: false
      properties:
        accuracyChange:
          type: number
          minimum: 0
          maximum: 1
          example: 0.05
        lossChange:
          type: number
          minimum: 0
          example: 0.01
    NotificationCreateRequest:
      type: object
      additionalProperties: false
      required:
      - userId
      - trainingId
      - notificationType
      properties:
        userId:
          type: string
          example: usr_01HZZY9V74N7R0H0V7S0A0B123
        trainingId:
          type: string
          example: trn_01HZZZ6JTK98FCG73RBTQ2P5EJ
        notificationType:
          type: string
          enum:
          - email
          - webhook
          example: email
        thresholds:
          $ref: '#/components/schemas/NotificationThresholds'
    PaginationMeta:
      type: object
      additionalProperties: false
      required:
      - limit
      - hasMore
      properties:
        cursor:
          type: string
          description: Cursor to request the next page. Omitted when hasMore=false.
        limit:
          type: integer
          minimum: 1
          maximum: 200
          example: 50
        hasMore:
          type: boolean
          example: true
        next:
          type: string
          format: uri
          description: Absolute URL for next page, if available.
    TrainingJobSummary:
      type: object
      additionalProperties: false
      required:
      - trainingId
      - status
      - submittedAt
      properties:
        trainingId:
          type: string
          pattern: ^trn_[A-Za-z0-9]+$
          example: trn_01HZZZ6JTK98FCG73RBTQ2P5EJ
        status:
          type: string
          enum:
          - queued
          - running
          - completed
          - failed
          - stopped
        submittedAt:
          type: string
          format: date-time
    PaginatedTrainingJobsResponse:
      type: object
      additionalProperties: false
      required:
      - data
      - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TrainingJobSummary'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
    WebhookEventTrainingCompleted:
      type: object
      additionalProperties: false
      required:
      - eventId
      - eventType
      - sentAt
      - data
      properties:
        eventId:
          type: string
          pattern: ^evt_[A-Za-z0-9]+$
          example: evt_01HZZZABCDEFG1234567890
        eventType:
          type: string
          enum:
          - training.completed
        sentAt:
          type: string
          format: date-time
        data:
          $ref: '#/components/schemas/TrainingResultsResponse'
    WebhookEventNotificationDelivered:
      type: object
      additionalProperties: false
      required:
      - eventId
      - eventType
      - sentAt
      - data
      properties:
        eventId:
          type: string
          pattern: ^evt_[A-Za-z0-9]+$
          example: evt_01HZZZABCDEFG1234567890
        eventType:
          type: string
          enum:
          - notification.delivered
        sentAt:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties: false
          required:
          - subscriptionId
          - deliveryStatus
          properties:
            subscriptionId:
              type: string
              pattern: ^sub_[A-Za-z0-9]+$
              example: sub_01HZZZN0T1F1CAT10N
            deliveryStatus:
              type: string
              enum:
              - delivered
              - failed
    FreezeHash:
      type: string
      description: Deterministic content hash of a canonicalized JSON manifest. Produced by the `freeze_snapshot` plugin (RFC 8785 / JCS-style canonical JSON + SHA-256). Two manifests that differ only in key order or insignificant whitespace produce the same FreezeHash; any field-level change produces a different FreezeHash.
      pattern: ^freeze:[a-f0-9]{64}$
      minLength: 71
      maxLength: 71
      example: freeze:95fcc2bdfb71b80a59ed5628871dce2fc9e9f0b857d7f6b90dfc5338c17e2f68
    FreezeResponse:
      type: object
      additionalProperties: false
      required:
      - resourceId
      - resourceKind
      - freezeHash
      - algorithm
      - frozenAt
      properties:
        resourceId:
          type: string
          description: Identifier of the frozen resource (e.g. circuitId or trainingId).
          example: cir_01HZZYH8V2DFD9M8Y4WJB9P3J4
        resourceKind:
          type: string
          description: Kind of the frozen resource.
          enum:
          - circuit
          - training_job
        freezeHash:
          $ref: '#/components/schemas/FreezeHash'
        algorithm:
          type: string
          description: Canonicalization and hash algorithm identifier.
          enum:
          - jcs-canonical-json+sha256
          example: jcs-canonical-json+sha256
        frozenAt:
          type: string
          format: date-time
          description: Timestamp when the freeze hash was last computed.
          example: '2026-04-22T12:30:00Z'
        canonicalBytes:
          type: integer
          minimum: 0
          description: Length in bytes of the canonical JSON representation that was hashed. Useful for cache sizing and audit reconciliation.
          example: 186
    PluginCapability:
      type: string
      pattern: ^[a-z][a-z0-9]*(\.[a-z][a-z0-9_]*){1,3}$
      minLength: 3
      maxLength: 128
      description: Dotted capability name (2–4 lowercase segments). Naming rules in plugins/REGISTRY_SPEC.md §4.
      example: webhook.verify.sha256
    PluginLifecycle:
      type: string
      description: Lifecycle state of a registered plugin. See plugins/REGISTRY_SPEC.md §6.
      enum:
      - registered
      - active
      - deprecated
      - revoked
      example: active
    PluginIntegrity:
      type: object
      additionalProperties: false
      required:
      - algorithm
      - entrypoint
      properties:
        algorithm:
          type: string
          enum:
          - sha256
          description: Hash algorithm used for entrypoint integrity.
          example: sha256
        entrypoint:
          type: string
          pattern: ^sha256:[a-f0-9]{64}$
          description: SHA-256 of the entrypoint file bytes, prefixed `sha256:`.
          example: sha256:e8635e8a008a58f0832fca25670d46037fb4b16a1f30cbed1de6f5ff5e095e03
        reference:
          type: string
          description: Human-readable cross-reference to the integrity primitive.
          example: ACT-019 freeze_snapshot — SHA-256 primitive applied to raw entrypoint bytes
    PluginEntrypoint:
      type: object
      additionalProperties: false
      required:
      - runtime
      - module
      - path
      properties:
        runtime:
          type: string
          enum:
          - python3
          description: Runtime that loads the entrypoint.
          example: python3
        module:
          type: string
          pattern: ^[a-zA-Z_][a-zA-Z0-9_]*$
          description: Importable Python module name inside the plugin directory.
          example: entrypoint
        path:
          type: string
          description: Path to the entrypoint file, relative to plugin.json.
          example: entrypoint.py
    Plugin:
      type: object
      additionalProperties: false
      description: Plugin descriptor as loaded from `plugin.json` and validated against `descriptor.schema.json`.
      required:
      - id
      - name
      - version
      - capabilities
      - entrypoint
      - integrity
      - author
      - license
      - lifecycle
      properties:
        id:
          type: string
          pattern: ^[a-z][a-z0-9_]{2,63}$
          description: Unique plugin identifier.
          example: sha256_verifier
        name:
          type: string
          minLength: 1
          maxLength: 128
          example: SHA-256 Webhook Signature Verifier
        version:
          type: string
          pattern: ^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$
          description: Semantic version of the plugin.
          example: 1.0.0
        description:
          type: string
          maxLength: 2048
        capabilities:
          type: array
          minItems: 1
          maxItems: 32
          uniqueItems: true
          items:
            $ref: '#/components/schemas/PluginCapability'
        entrypoint:
          $ref: '#/components/schemas/PluginEntrypoint'
        integrity:
          $ref: '#/components/schemas/PluginIntegrity'
        author:
          type: string
          minLength: 1
          maxLength: 256
          example: Tanner Jacobsen
        license:
          type: string
          minLength: 1
          maxLength: 128
          example: Proprietary
        lifecycle:
          $ref: '#/components/schemas/PluginLifecycle'
        contractVersion:
          type: string
          pattern: ^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$
          example: 1.3.0
        homepage:
          type: string
          format: uri
        replaces:
          type: array
          uniqueItems: true
          items:
            type: string
            pattern: ^[a-z][a-z0-9_]{2,63}$
    PaginatedPluginsResponse:
      type: object
      additionalProperties: false
      required:
      - data
      - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Plugin'
        pagination:
          type: object
          additionalProperties: false
          required:
          - limit
          - has_more
          properties:
            next_cursor:
              type:
              - string
              - "null"
              description: Cursor to fetch the next page; `null` when no more data.
            limit:
              type: integer
              minimum: 1
              maximum: 200
            has_more:
              type: boolean
    PluginIntegrityVerification:
      type: object
      additionalProperties: false
      required:
      - pluginId
      - verified
      - algorithm
      - expected
      - computed
      - verifiedAt
      properties:
        pluginId:
          type: string
          pattern: ^[a-z][a-z0-9_]{2,63}$
          example: sha256_verifier
        verified:
          type: boolean
          description: True iff the recomputed hash matches the hash recorded in the descriptor.
        algorithm:
          type: string
          enum:
          - sha256
        expected:
          type: string
          pattern: ^sha256:[a-f0-9]{64}$
          description: The hash declared in the descriptor at load time.
        computed:
          type: string
          pattern: ^sha256:[a-f0-9]{64}$
          description: The hash recomputed from the on-disk entrypoint bytes.
        verifiedAt:
          type: string
          format: date-time
          example: '2026-04-22T12:45:00Z'
webhooks:
  training.completed:
    post:
      summary: Training completed webhook
      description: Outbound callback when a training job completes. Verify X-Katopu-Signature header with HMAC-SHA256 and WEBHOOK_SIGNING_SECRET.
      parameters:
      - name: X-Katopu-Signature
        in: header
        required: true
        schema:
          type: string
          pattern: ^sha256=[A-Fa-f0-9]{64}$
        description: Webhook signature in sha256 format.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookEventTrainingCompleted'
      responses:
        '200':
          description: Webhook accepted
        '400':
          description: Invalid payload
        '401':
          description: Invalid webhook signature
      operationId: webhookTrainingCompleted
  notification.delivered:
    post:
      summary: Notification delivery webhook
      description: Outbound callback when notification delivery status changes. Verify X-Katopu-Signature header with HMAC-SHA256.
      parameters:
      - name: X-Katopu-Signature
        in: header
        required: true
        schema:
          type: string
          pattern: ^sha256=[A-Fa-f0-9]{64}$
        description: Webhook signature in sha256 format.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookEventNotificationDelivered'
      responses:
        '200':
          description: Webhook accepted
        '400':
          description: Invalid payload
        '401':
          description: Invalid webhook signature
      operationId: webhookNotificationDelivered
