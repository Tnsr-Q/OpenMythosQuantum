openapi: 3.1.0
info:
  title: Katopu Quantum AGI API
  summary: Production-ready unified API for quantum workflows, AGI optimization, guidance, security, and training automation.
  description: "This contract consolidates the draft APIs into a stricter production-oriented interface.\n\nDesign choices:\n  - explicit versioned base path\n  - normalized resource naming\n  - unique operationIds\n  - reusable components\n  - explicit authentication and authorization\n  - stricter request/response schemas\n  - examples cleaned up for implementation and testing\n"
  version: 1.4.0
  contact:
    name: Tnsr-Q
    url: https://github.com/Tnsr-Q
    x-orcid: https://orcid.org/0009-0000-7999-7242
  license:
    name: Proprietary - review before production use
    url: https://github.com/Tnsr-Q
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
servers:
- url: https://api.{environment}.katopu.example.com/{basePath}
  description: Main API gateway
  variables:
    environment:
      default: prod
      enum:
      - prod
      - staging
      - dev
    basePath:
      default: v1
- url: https://{region}.api.{environment}.katopu.example.com/{basePath}
  description: Regional API gateway
  variables:
    region:
      default: us
      enum:
      - us
      - eu
      - ap
    environment:
      default: prod
      enum:
      - prod
      - staging
    basePath:
      default: v1
tags:
- name: Health
  description: Service health and readiness checks.
- name: Users
  description: User lifecycle and profile retrieval.
- name: Orders
  description: Order creation and lookup operations.
- name: Circuits
  description: Quantum circuit CRUD and optimization workflows.
- name: Quantum
  description: Quantum job submission and execution status.
- name: Guidance
  description: Assisted planning and recommendation endpoints.
- name: Security
  description: Encryption, decryption, and security controls.
- name: Monitoring
  description: Operational and security monitoring operations.
- name: Updates
  description: Release and update orchestration APIs.
- name: Training
  description: Training orchestration, analytics, and model outputs.
- name: Notifications
  description: Notification subscription and delivery contracts.
- name: AGI
  description: Controlled AGI self-improvement lifecycle operations.
- name: Plugins
  description: Capability-aware plugin registry discovery and integrity verification (see plugins/REGISTRY_SPEC.md).
security:
- BearerAuth: []
- ApiKeyAuth: []
paths:
  /healthz:
    get:
      tags:
      - Health
      operationId: getHealthStatus
      summary: Get service health
      description: Returns a lightweight health summary for load balancers and uptime checks.
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                ok:
                  value:
                    status: ok
                    version: 1.0.0
                    environment: prod
                    timestamp: '2026-04-22T12:00:00Z'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /users:
    post:
      tags:
      - Users
      operationId: createUser
      summary: Create user
      description: Creates a new user account.
      security:
      - BearerAuth: []
      - OAuth2ClientCredentials:
        - users.write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
            examples:
              default:
                value:
                  username: tjacobsen
                  email: tnsr_q@icloud.com
      responses:
        '201':
          description: User created
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              examples:
                created:
                  value:
                    userId: usr_01HZZY9V74N7R0H0V7S0A0B123
                    username: tjacobsen
                    email: tnsr_q@icloud.com
                    createdAt: '2026-04-22T12:00:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
  /users/{userId}:
    parameters:
    - $ref: '#/components/parameters/UserId'
    get:
      tags:
      - Users
      operationId: getUserById
      summary: Get user by ID
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - users.read
      responses:
        '200':
          description: User found
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              examples:
                found:
                  value:
                    userId: usr_01HZZY9V74N7R0H0V7S0A0B123
                    username: tjacobsen
                    email: tnsr_q@icloud.com
                    createdAt: '2026-04-22T12:00:00Z'
        '404':
          $ref: '#/components/responses/NotFound'
  /orders:
    post:
      tags:
      - Orders
      operationId: createOrder
      summary: Create order
      security:
      - BearerAuth: []
      - OAuth2ClientCredentials:
        - orders.write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
            examples:
              default:
                value:
                  product: quantum_compute_credit
                  quantity: 10
                  price: 199.99
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              examples:
                created:
                  value:
                    orderId: ord_01HZZYBG4J67D4Q5J1WJNSG8VX
                    product: quantum_compute_credit
                    quantity: 10
                    price: 199.99
                    currency: USD
                    createdAt: '2026-04-22T12:00:00Z'
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
  /orders/{orderId}:
    parameters:
    - $ref: '#/components/parameters/OrderId'
    get:
      tags:
      - Orders
      operationId: getOrderById
      summary: Get order by ID
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - orders.read
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              examples:
                found:
                  value:
                    orderId: ord_01HZZYBG4J67D4Q5J1WJNSG8VX
                    product: quantum_compute_credit
                    quantity: 10
                    price: 199.99
                    currency: USD
                    createdAt: '2026-04-22T12:00:00Z'
        '404':
          $ref: '#/components/responses/NotFound'
  /circuits:
    post:
      tags:
      - Circuits
      operationId: createCircuit
      summary: Create a quantum circuit
      description: Creates a circuit definition with optional optimization preferences.
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - circuits.write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CircuitCreateRequest'
            examples:
              bellState:
                value:
                  qubits: 2
                  optimizationGoal: minimum_depth
                  gates:
                  - type: H
                    targetQubit: 0
                  - type: CNOT
                    controlQubit: 0
                    targetQubit: 1
      responses:
        '201':
          description: Circuit created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CircuitCreateResponse'
              examples:
                created:
                  value:
                    circuitId: cir_01HZZYH8V2DFD9M8Y4WJB9P3J4
                    qubits: 2
                    status: created
                    optimization:
                      reducedGateCount: 0
                      depth: 2
                    createdAt: '2026-04-22T12:00:00Z'
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
  /circuits/{circuitId}:
    parameters:
    - $ref: '#/components/parameters/CircuitId'
    get:
      tags:
      - Circuits
      operationId: getCircuitById
      summary: Get circuit by ID
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - circuits.read
      responses:
        '200':
          description: Circuit found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CircuitResource'
              examples:
                found:
                  value:
                    circuitId: cir_01HZZYH8V2DFD9M8Y4WJB9P3J4
                    qubits: 2
                    status: created
                    gates:
                    - type: H
                      targetQubit: 0
                    - type: CNOT
                      controlQubit: 0
                      targetQubit: 1
                    createdAt: '2026-04-22T12:00:00Z'
        '404':
          $ref: '#/components/responses/NotFound'
  /circuits/{circuitId}/simulate:
    parameters:
    - $ref: '#/components/parameters/CircuitId'
    post:
      tags:
      - Circuits
      - Quantum
      operationId: simulateCircuit
      summary: Simulate a circuit
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - circuits.execute
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CircuitSimulationRequest'
            examples:
              shots:
                value:
                  shots: 1000
      responses:
        '200':
          description: Simulation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationResult'
              examples:
                bellState:
                  value:
                    circuitId: cir_01HZZYH8V2DFD9M8Y4WJB9P3J4
                    shots: 1000
                    probabilities:
                      '00': 0.5
                      '11': 0.5
                    histogram:
                      '00': 497
                      '11': 503
                    completedAt: '2026-04-22T12:01:00Z'
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
  /circuits/{circuitId}/optimize:
    parameters:
    - $ref: '#/components/parameters/CircuitId'
    post:
      tags:
      - Circuits
      - AGI
      operationId: optimizeCircuit
      summary: Optimize a circuit
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - circuits.write
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CircuitOptimizationRequest'
            examples:
              default:
                value:
                  objective: fidelity
      responses:
        '200':
          description: Optimization completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationResult'
              examples:
                optimized:
                  value:
                    originalCircuitId: cir_01HZZYH8V2DFD9M8Y4WJB9P3J4
                    optimizedCircuitId: cir_01HZZYJ2DS44A6N9J23NT2K5A1
                    objective: fidelity
                    reducedGateCount: 1
                    originalDepth: 3
                    optimizedDepth: 2
                    estimatedFidelity: 0.993
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
  /circuits/{circuitId}/freeze:
    parameters:
    - $ref: '#/components/parameters/CircuitId'
    post:
      tags:
      - Circuits
      operationId: freezeCircuit
      summary: Freeze a circuit to a deterministic content hash
      description: |
        Computes a deterministic `freeze:<sha256>` identity over the canonical
        JSON serialization of the circuit definition (gates, qubits, schema
        version, metadata). The freeze hash is idempotent: repeated calls on
        an unchanged circuit return the same hash.

        Freeze hashes are **content** hashes, distinct from `circuitId`
        (which is a mutable pointer). Use freeze hashes for reproducibility,
        audit, and caching; use `circuitId` for routing.
      security:
      - BearerAuth: []
      - OAuth2ClientCredentials:
        - circuits.freeze
      responses:
        '200':
          description: Freeze hash computed (or returned unchanged if the circuit has not been modified).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreezeResponse'
              examples:
                bellStateFrozen:
                  value:
                    resourceId: cir_01HZZYH8V2DFD9M8Y4WJB9P3J4
                    resourceKind: circuit
                    freezeHash: freeze:95fcc2bdfb71b80a59ed5628871dce2fc9e9f0b857d7f6b90dfc5338c17e2f68
                    algorithm: jcs-canonical-json+sha256
                    frozenAt: '2026-04-22T12:30:00Z'
                    canonicalBytes: 186
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
    get:
      tags:
      - Circuits
      operationId: getCircuitFreeze
      summary: Retrieve the current freeze hash for a circuit
      description: |
        Returns the most recently computed freeze hash for the circuit. Returns
        404 if the circuit exists but has never been frozen.
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - circuits.read
      responses:
        '200':
          description: Current freeze hash
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreezeResponse'
              examples:
                current:
                  value:
                    resourceId: cir_01HZZYH8V2DFD9M8Y4WJB9P3J4
                    resourceKind: circuit
                    freezeHash: freeze:95fcc2bdfb71b80a59ed5628871dce2fc9e9f0b857d7f6b90dfc5338c17e2f68
                    algorithm: jcs-canonical-json+sha256
                    frozenAt: '2026-04-22T12:30:00Z'
                    canonicalBytes: 186
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /quantum/jobs:
    post:
      tags:
      - Quantum
      operationId: createQuantumJob
      summary: Submit a quantum computation job
      description: Creates a compute job from a QASM circuit or a structured circuit definition.
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - quantum.execute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuantumJobCreateRequest'
            examples:
              qasm:
                value:
                  qasm: 'OPENQASM 2.0;

                    include "qelib1.inc";

                    qreg q[2];

                    creg c[2];

                    h q[0];

                    cx q[0],q[1];

                    measure q -> c;

                    '
      responses:
        '202':
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuantumJobAcceptedResponse'
              examples:
                accepted:
                  value:
                    jobId: qjob_01HZZYQJK5SM0Q4MB4J1F96M6B
                    status: queued
                    submittedAt: '2026-04-22T12:00:00Z'
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
  /quantum/jobs/{jobId}:
    parameters:
    - $ref: '#/components/parameters/JobId'
    get:
      tags:
      - Quantum
      operationId: getQuantumJobById
      summary: Get quantum job status
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - quantum.read
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuantumJobResponse'
              examples:
                complete:
                  value:
                    jobId: qjob_01HZZYQJK5SM0Q4MB4J1F96M6B
                    status: completed
                    result:
                      fidelity: 0.981
                      measurements:
                        '00': 0.49
                        '11': 0.51
                    startedAt: '2026-04-22T12:00:20Z'
                    completedAt: '2026-04-22T12:01:05Z'
        '404':
          $ref: '#/components/responses/NotFound'
  /guidance/assist:
    post:
      tags:
      - Guidance
      operationId: generateGuidance
      summary: Generate guided assistance
      description: Produces step-by-step guidance based on target goal and experience level.
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - guidance.read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuidanceRequest'
            examples:
              beginnerBell:
                value:
                  targetGoal: high_fidelity
                  experienceLevel: beginner
                  userPrompt: Help me build a Bell-state circuit.
      responses:
        '200':
          description: Guidance generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuidanceResponse'
              examples:
                beginnerBell:
                  value:
                    steps:
                    - Apply a Hadamard gate to qubit 0.
                    - Apply a CNOT gate from qubit 0 to qubit 1.
                    - Simulate the circuit with 1000 shots.
                    totalSteps: 3
                    completionStatus: completed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
  /security/encrypt:
    post:
      tags:
      - Security
      operationId: encryptPayload
      summary: Encrypt payload
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - security.write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EncryptRequest'
            examples:
              default:
                value:
                  data: sensitive payload
      responses:
        '200':
          description: Payload encrypted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EncryptResponse'
              examples:
                encrypted:
                  value:
                    encryptedData: base64:c2VjdXJlLWJsb2I=
                    algorithm: aes-256-gcm
                    keyId: key_2026_04
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
  /security/decrypt:
    post:
      tags:
      - Security
      operationId: decryptPayload
      summary: Decrypt payload
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2ClientCredentials:
        - security.write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecryptRequest'
            examples:
              default:
                value:
                  encryptedData: base64:c2VjdXJlLWJsb2I=
      responses:
        '200':
          description: Payload decrypted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecryptResponse'
              examples:
                decrypted:
                  value:
                    data: sensitive payload
                    status: decrypted
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
