# Prometheus scrape configuration for OpenMythos API
# Add this to your prometheus.yml under scrape_configs

scrape_configs:
  # OpenMythos API - static configuration
  - job_name: 'openmythos-api'
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    scheme: https
    tls_config:
      insecure_skip_verify: false
      ca_file: /etc/prometheus/certs/ca.crt
    static_configs:
      - targets:
          - 'api.openmythos.example.com:443'
        labels:
          environment: 'production'
          service: 'openmythos-api'
          region: 'us-east-1'

  # OpenMythos API - Kubernetes service discovery
  - job_name: 'openmythos-api-k8s'
    scrape_interval: 15s
    scrape_timeout: 10s
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - openmythos
    relabel_configs:
      # Only scrape pods with prometheus.io/scrape annotation
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true

      # Use custom metrics path if specified
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)

      # Use custom port if specified
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__

      # Add pod metadata as labels
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod

      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace

      - source_labels: [__meta_kubernetes_pod_label_app]
        action: replace
        target_label: app

      - source_labels: [__meta_kubernetes_pod_label_version]
        action: replace
        target_label: version

  # OpenMythos API - EC2 service discovery (AWS)
  - job_name: 'openmythos-api-ec2'
    scrape_interval: 15s
    scrape_timeout: 10s
    ec2_sd_configs:
      - region: us-east-1
        port: 8000
        filters:
          - name: tag:Service
            values:
              - openmythos-api
          - name: instance-state-name
            values:
              - running
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Environment]
        target_label: environment

      - source_labels: [__meta_ec2_tag_Version]
        target_label: version

      - source_labels: [__meta_ec2_instance_id]
        target_label: instance_id

      - source_labels: [__meta_ec2_availability_zone]
        target_label: availability_zone

      - source_labels: [__meta_ec2_private_ip]
        replacement: ${1}:8000
        target_label: __address__

  # Training job metrics exporter (if deployed separately)
  - job_name: 'openmythos-training-exporter'
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'training-exporter.openmythos.svc.cluster.local:9090'
        labels:
          service: 'training-exporter'

# Metric relabel configs (apply to all jobs)
# Filter and transform metrics before storage
metric_relabel_configs:
  # Keep only OpenMythos metrics
  - source_labels: [__name__]
    regex: 'openmythos_.*'
    action: keep

  # Drop high-cardinality labels
  - regex: 'request_id|trace_id'
    action: labeldrop

  # Normalize status codes into classes
  - source_labels: [status_code]
    target_label: status_class
    regex: '([2-5])\d{2}'
    replacement: '${1}xx'

# Alert manager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# Load alert rules
rule_files:
  - '/etc/prometheus/rules/openmythos-alerts.yml'
